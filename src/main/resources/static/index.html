<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div id="authSection">
                    <h2 class="text-center">Task Manager</h2>
                    <ul class="nav nav-tabs" id="authTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                        </li>
                    </ul>
                    <div class="tab-content mt-3">
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label>Username</label>
                                    <input type="text" id="loginUsername" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label>Password</label>
                                    <input type="password" id="loginPassword" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Login</button>
                                <div id="loginError" class="text-danger mt-2"></div>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label>Username</label>
                                    <input type="text" id="regUsername" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label>Email</label>
                                    <input type="email" id="regEmail" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label>Password</label>
                                    <input type="password" id="regPassword" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Register</button>
                                <div id="regSuccess" class="text-success mt-2"></div>
                                <div id="regError" class="text-danger mt-2"></div>
                            </form>
                        </div>
                    </div>
                </div>

                <div id="taskSection" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center">
                        <h2>My Tasks</h2>
                        <button id="logoutBtn" class="btn btn-outline-danger">Logout</button>
                    </div>
                    <hr>
                    <form id="taskForm">
                        <div class="mb-3">
                            <input type="text" id="taskTitle" placeholder="Task title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <textarea id="taskDesc" placeholder="Description" class="form-control"></textarea>
                        </div>
                        <div class="mb-3">
                            <select id="taskStatus" class="form-select">
                                <option value="PENDING">PENDING</option>
                                <option value="IN_PROGRESS">IN_PROGRESS</option>
                                <option value="COMPLETED">COMPLETED</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Task</button>
                    </form>
                    <hr>
                    <ul id="taskList" class="list-group mt-3"></ul>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
