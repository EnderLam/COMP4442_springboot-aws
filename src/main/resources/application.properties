spring.application.name=taskmanager

# Server
server.port=8080

# Database (PostgreSQL for AWS, H2 for local)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis (ElastiCache or local)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# JWT
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2025!}
jwt.expiration.ms=86400000   # 24 hours

# Logging
logging.level.com.example.taskmanager=DEBUG

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html