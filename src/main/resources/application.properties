spring.application.name=taskmanager

# Server
server.port=8080

# H2 Database (in-memory, no external DB needed)
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (optional, to view data)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Redis cache completely (to avoid connection errors)
spring.cache.type=none

# JWT (make sure secret is long enough)
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2025!ThisIsLongEnough
jwt.expiration.ms=86400000

# Logging
logging.level.com.example.taskmanager=DEBUG

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html